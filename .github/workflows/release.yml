name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            os: macos
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            os: macos
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os: windows
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux BLE deps (x86_64)
        if: matrix.os == 'linux' && matrix.cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install aarch64 cross toolchain + BLE deps (Linux arm64)
        if: matrix.cross == true
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict default sources to amd64/i386 so arm64 isn't fetched from the main mirror.
          sudo sed -i 's|^deb http|deb [arch=amd64,i386] http|g' /etc/apt/sources.list
          # Add ports.ubuntu.com for arm64 packages.
          sudo tee /etc/apt/sources.list.d/arm64.list >/dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-aarch64-linux-gnu libdbus-1-dev:arm64
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Configure pkg-config for aarch64 cross build
        if: matrix.cross == true
        run: |
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mlink-cli

      - name: Determine tag
        id: tag
        shell: bash
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          NAME="mlink-${TAG}-${TARGET}"
          mkdir -p "dist/${NAME}"
          cp "target/${TARGET}/release/mlink" "dist/${NAME}/"
          cp README.md INSTALL.md "dist/${NAME}/" 2>/dev/null || true
          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $TAG = "${{ steps.tag.outputs.tag }}"
          $TARGET = "${{ matrix.target }}"
          $NAME = "mlink-$TAG-$TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$NAME" | Out-Null
          Copy-Item "target/$TARGET/release/mlink.exe" "dist/$NAME/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$NAME/" }
          if (Test-Path INSTALL.md) { Copy-Item INSTALL.md "dist/$NAME/" }
          Push-Location dist
          Compress-Archive -Path $NAME -DestinationPath "$NAME.zip"
          $hash = (Get-FileHash "$NAME.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $NAME.zip" | Out-File -Encoding ascii "$NAME.zip.sha256"
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlink-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          {
            echo "## Changes"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Commits since \`${PREV_TAG}\`:"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}"
            else
              echo "Initial release."
              echo
              git log --pretty=format:'- %s (%h)' "${TAG}"
            fi
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release/*
          fail_on_unmatched_files: true
